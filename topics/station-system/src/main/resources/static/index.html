<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車站管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <!-- 標題 -->
        <div class="text-center mb-4">
            <h1 class="display-4">🚇 車站管理系統</h1>
            <p class="lead text-muted">Metro Transit Corporation - Station Management</p>
        </div>

        <!-- 新增車站表單 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    <i class="bi bi-plus-circle"></i> 新增車站
                </h5>
            </div>
            <div class="card-body">
                <form id="stationForm">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="code" class="form-label">車站代碼</label>
                            <input type="text" class="form-control" id="code" placeholder="例如: R3, O5" required>
                            <div class="form-text">紅線 R / 橘線 O</div>
                        </div>
                        <div class="col-md-4">
                            <label for="name" class="form-label">車站名稱</label>
                            <input type="text" class="form-control" id="name" placeholder="例如: 中央車站" required>
                        </div>
                        <div class="col-md-3">
                            <label for="line" class="form-label">路線</label>
                            <select class="form-select" id="line" required>
                                <option value="">選擇路線</option>
                                <option value="紅線">紅線</option>
                                <option value="橘線">橘線</option>
                            </select>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-plus-lg"></i> 新增
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- 車站列表 -->
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">
                    <i class="bi bi-list-ul"></i> 車站列表
                </h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th style="width: 10%">代碼</th>
                                <th style="width: 30%">名稱</th>
                                <th style="width: 15%">路線</th>
                                <th style="width: 30%">建立時間</th>
                                <th style="width: 15%" class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="stationList">
                            <tr>
                                <td colspan="5" class="text-center text-muted">
                                    <div class="spinner-border spinner-border-sm me-2" role="status">
                                        <span class="visually-hidden">載入中...</span>
                                    </div>
                                    載入車站資料中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 頁尾 -->
        <footer class="text-center mt-5 mb-3 text-muted">
            <p>© 2024 捷運系統公司 | IBM Bob Workshop 初始專案</p>
        </footer>
    </div>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
