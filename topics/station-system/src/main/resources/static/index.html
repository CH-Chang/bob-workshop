<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車站管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <!-- 標題 -->
        <div class="text-center mb-4">
            <h1 class="display-4">🚇 車站管理系統</h1>
            <p class="lead text-muted">Metro Transit Corporation - Station Management</p>
        </div>

        <!-- 統計資訊卡片 -->
        <div class="row mb-4" id="statisticsCards">
            <div class="col-md-3">
                <div class="card text-center shadow-sm stats-card">
                    <div class="card-body">
                        <i class="bi bi-chat-dots fs-1 text-primary"></i>
                        <h5 class="mt-2">總回饋數</h5>
                        <h2 class="mb-0" id="totalFeedbacks">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm stats-card">
                    <div class="card-body">
                        <i class="bi bi-star-fill fs-1 text-warning"></i>
                        <h5 class="mt-2">平均評分</h5>
                        <h2 class="mb-0" id="averageRating">0.0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm stats-card">
                    <div class="card-body">
                        <i class="bi bi-clock-history fs-1 text-info"></i>
                        <h5 class="mt-2">待處理</h5>
                        <h2 class="mb-0" id="pendingCount">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-sm stats-card">
                    <div class="card-body">
                        <i class="bi bi-check-circle-fill fs-1 text-success"></i>
                        <h5 class="mt-2">已完成</h5>
                        <h2 class="mb-0" id="completedCount">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- 回饋提交表單 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">
                    <i class="bi bi-chat-left-text"></i> 提交回饋
                </h5>
            </div>
            <div class="card-body">
                <form id="feedbackForm">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="feedbackStation" class="form-label">選擇車站 *</label>
                            <select class="form-select" id="feedbackStation" required>
                                <option value="">請選擇車站</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="rating" class="form-label">評分 *</label>
                            <select class="form-select" id="rating" required>
                                <option value="">請選擇評分</option>
                                <option value="5">⭐⭐⭐⭐⭐ 非常滿意</option>
                                <option value="4">⭐⭐⭐⭐ 滿意</option>
                                <option value="3">⭐⭐⭐ 普通</option>
                                <option value="2">⭐⭐ 不滿意</option>
                                <option value="1">⭐ 非常不滿意</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="category" class="form-label">類別 *</label>
                            <select class="form-select" id="category" required>
                                <option value="">請選擇類別</option>
                                <option value="清潔">🧹 清潔</option>
                                <option value="服務">👥 服務</option>
                                <option value="設施">🏢 設施</option>
                                <option value="安全">🛡️ 安全</option>
                                <option value="其他">📝 其他</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mt-2">
                        <div class="col-md-8">
                            <label for="comment" class="form-label">意見內容 *</label>
                            <textarea class="form-control" id="comment" rows="3" placeholder="請描述您的意見..." required maxlength="1000"></textarea>
                            <div class="form-text">最多 1000 字</div>
                        </div>
                        <div class="col-md-4">
                            <label for="contactEmail" class="form-label">聯絡信箱（選填）</label>
                            <input type="email" class="form-control" id="contactEmail" placeholder="your@email.com">
                            <button type="submit" class="btn btn-info w-100 mt-3">
                                <i class="bi bi-send"></i> 提交回饋
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- 新增車站表單 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    <i class="bi bi-plus-circle"></i> 新增車站
                </h5>
            </div>
            <div class="card-body">
                <form id="stationForm">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="code" class="form-label">車站代碼</label>
                            <input type="text" class="form-control" id="code" placeholder="例如: R3, O5" required>
                            <div class="form-text">紅線 R / 橘線 O</div>
                        </div>
                        <div class="col-md-4">
                            <label for="name" class="form-label">車站名稱</label>
                            <input type="text" class="form-control" id="name" placeholder="例如: 中央車站" required>
                        </div>
                        <div class="col-md-3">
                            <label for="line" class="form-label">路線</label>
                            <select class="form-select" id="line" required>
                                <option value="">選擇路線</option>
                                <option value="紅線">紅線</option>
                                <option value="橘線">橘線</option>
                            </select>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-plus-lg"></i> 新增
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- 回饋列表 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-warning">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="bi bi-chat-square-text"></i> 回饋列表
                    </h5>
                    <div class="btn-group btn-group-sm" role="group">
                        <button type="button" class="btn btn-outline-dark active" onclick="filterFeedbacks('all')">全部</button>
                        <button type="button" class="btn btn-outline-dark" onclick="filterFeedbacks('待處理')">待處理</button>
                        <button type="button" class="btn btn-outline-dark" onclick="filterFeedbacks('處理中')">處理中</button>
                        <button type="button" class="btn btn-outline-dark" onclick="filterFeedbacks('已完成')">已完成</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <div id="feedbackList">
                    <div class="text-center text-muted">
                        <div class="spinner-border spinner-border-sm me-2" role="status">
                            <span class="visually-hidden">載入中...</span>
                        </div>
                        載入回饋資料中...
                    </div>
                </div>
            </div>
        </div>


        <!-- 車站列表 -->
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">
                    <i class="bi bi-list-ul"></i> 車站列表
                </h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th style="width: 10%">代碼</th>
                                <th style="width: 30%">名稱</th>
                                <th style="width: 15%">路線</th>
                                <th style="width: 30%">建立時間</th>
                                <th style="width: 15%" class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="stationList">
                            <tr>
                                <td colspan="5" class="text-center text-muted">
                                    <div class="spinner-border spinner-border-sm me-2" role="status">
                                        <span class="visually-hidden">載入中...</span>
                                    </div>
                                    載入車站資料中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 頁尾 -->
        <footer class="text-center mt-5 mb-3 text-muted">
            <p>© 2024 捷運系統公司 | IBM Bob Workshop 初始專案</p>
        </footer>
    </div>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>
</html>
